version: '3.8'

services:
  free-code-web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - WORKSPACE_DIR=/workspace
      - MAX_SESSIONS=10
      - SESSION_TIMEOUT=3600000
    volumes:
      - free-code-workspace:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  free-code-workspace:
